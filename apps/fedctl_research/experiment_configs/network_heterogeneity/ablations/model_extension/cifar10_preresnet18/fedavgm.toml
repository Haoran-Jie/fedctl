[experiment]
method = "fedavgm"
task = "cifar10_preresnet18"
seeds = [1337, 1338, 1339]

[server]
num-server-rounds = 10
fraction-train = 1.0
fraction-evaluate = 1.0
min-available-nodes = 4
min-train-nodes = 4
min-evaluate-nodes = 4
capability-discovery-timeout-s = 120.0

[client]
local-epochs = 1
learning-rate = 0.01
batch-size = 32

[data]
partitioning = "iid"
partitioning-num-labels = 2
partitioning-dirichlet-alpha = 0.1
masked-cross-entropy = "auto"

[model]
global-model-rate = 1.0
default-model-rate = 1.0

[fedavgm]
server-momentum = 0.9

[evaluation]
client-eval-enabled = false
final-client-eval-enabled = true

[wandb]
enabled = true
group = "fedbuff-ablation-model_extension-cifar10_preresnet18"
tags = ["fedbuff", "ablation", "model_extension", "cifar10_preresnet18", "fedavgm"]

[devices.rpi4]
model-rate = 1.0
batch-size = 8
max-train-examples = 1024
max-test-examples = 256

[devices.rpi5]
model-rate = 1.0
batch-size = 16
max-train-examples = 4096
max-test-examples = 1024
