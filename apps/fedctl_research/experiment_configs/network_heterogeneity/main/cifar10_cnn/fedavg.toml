[experiment]
method = "fedavg"
task = "cifar10_cnn"
seeds = [1337, 1338, 1339]

[server]
num-server-rounds = 20
fraction-train = 1.0
fraction-evaluate = 1.0
min-available-nodes = 12
min-train-nodes = 12
min-evaluate-nodes = 12
capability-discovery-timeout-s = 120.0

[client]
local-epochs = 1
learning-rate = 0.01
batch-size = 32

[data]
partitioning = "iid"
partitioning-num-labels = 2
partitioning-dirichlet-alpha = 0.1
masked-cross-entropy = "auto"

[model]
global-model-rate = 1.0
default-model-rate = 1.0

[evaluation]
client-eval-enabled = false
final-client-eval-enabled = true

[wandb]
enabled = true
group = "network_heterogeneity-main-cifar10_cnn"
tags = ["network_heterogeneity", "main", "cifar10_cnn", "fedavg"]

[devices.rpi4]
model-rate = 1.0
batch-size = 8
max-train-examples = 4167
max-test-examples = 834

[devices.rpi5]
model-rate = 1.0
batch-size = 32
max-train-examples = 4167
max-test-examples = 834
