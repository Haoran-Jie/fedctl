deploy:
  supernodes:
    rpi4: 5
    rpi5: 10
  superexec:
    env:
      WANDB_API_KEY: "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"
      WANDB_PROJECT: "fedctl"
      WANDB_ENTITY: "samueljie1-the-university-of-cambridge"
  placement:
    allow_oversubscribe: false
    spread_across_hosts: true
    prefer_spread_across_hosts: true
  resources:
    supernode:
      default: { cpu: 1000, mem: 1024 }
      rpi4: { cpu: 1000, mem: 1024 }
      rpi5: { cpu: 1000, mem: 1024 }
    superexec_clientapp: { cpu: 2000, mem: 2048 }
    superexec_serverapp: { cpu: 2000, mem: 2048 }
    superlink: { cpu: 1000, mem: 1024 }
  network:
    image: "jiahborcn/netem:latest"
    default_profile: none
    interface: eth0
    apply:
      superexec_serverapp: false
      superexec_clientapp: true
    profiles:
      none: {}
      mild: { delay_ms: 20, jitter_ms: 5, loss_pct: 0.0, rate_mbit: 100, rate_latency_ms: 50, rate_burst_kbit: 256 }
      med: { delay_ms: 60, jitter_ms: 10, loss_pct: 1.0, rate_mbit: 50, rate_latency_ms: 50, rate_burst_kbit: 256 }
      asym_up: { delay_ms: 120, jitter_ms: 20, loss_pct: 1.0, rate_mbit: 20, rate_latency_ms: 50, rate_burst_kbit: 256 }
      asym_down: { delay_ms: 30, jitter_ms: 5, loss_pct: 0.5, rate_mbit: 80, rate_latency_ms: 50, rate_burst_kbit: 256 }

submit:
