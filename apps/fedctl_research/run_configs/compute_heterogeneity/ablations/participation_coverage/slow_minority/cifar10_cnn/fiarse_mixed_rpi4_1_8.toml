partitioning-total-partitions = 15
[run]
method = "fiarse"
task = "cifar10_cnn"
seeds = [1337, 1338, 1339]

[server]
num-server-rounds = 20
fraction-train = 1.0
fraction-evaluate = 1.0
min-available-nodes = 15
min-train-nodes = 15
min-evaluate-nodes = 15
capability-discovery-timeout-s = 180.0

[client]
local-epochs = 3
learning-rate = 0.05
batch-size = 32

[data]
partitioning = "dirichlet"
partitioning-num-labels = 2
partitioning-dirichlet-alpha = 0.3
masked-cross-entropy = "auto"

[model]
global-model-rate = 1.0
default-model-rate = 0.125

[capacity]
model-split-mode = "fix"
model-rate-levels = [1.0, 0.125]
model-rate-proportions = [0.8, 0.2]
heterofl-device-type-allocations = "rpi5:1.0@12;rpi4:0.125@3"

[evaluation]
client-eval-enabled = false
final-client-eval-enabled = false

[fiarse]
threshold-mode = "global"

[wandb]
enabled = true
group = "compute_heterogeneity-ablation-slow_minority-cifar10_cnn"
tags = ["compute_heterogeneity", "ablation", "slow_minority", "cifar10_cnn", "noniid", "fiarse", "mixed_rpi4_1_8"]

[devices.rpi4]
model-rate = 0.125
batch-size = 8
max-train-examples = 2500
max-test-examples = 500

[devices.rpi5]
model-rate = 1.0
batch-size = 32
max-train-examples = 2500
max-test-examples = 500
