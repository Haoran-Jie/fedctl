[run]
method = "heterofl"
task = "cifar10_cnn"
seeds = [1337, 1338, 1339]

[server]
num-server-rounds = 20
fraction-train = 1.0
fraction-evaluate = 1.0
min-available-nodes = 10
min-train-nodes = 10
min-evaluate-nodes = 10
capability-discovery-timeout-s = 120.0

[client]
local-epochs = 1
learning-rate = 0.01
batch-size = 32

[data]
partitioning = "iid"
partitioning-num-labels = 2
partitioning-dirichlet-alpha = 0.1
masked-cross-entropy = "auto"

[model]
global-model-rate = 1
default-model-rate = 0.5

[capacity]
model-split-mode = "fix"
model-rate-levels = [1, 0.5]
model-rate-proportions = [0.8, 0.2]
heterofl-partition-rates = "0:1,1:1,2:1,3:1,4:1,5:1,6:1,7:1,8:0.5,9:0.5"

[wandb]
enabled = true
group = "ablation-fixed_pair_interpolation-cifar10_cnn"
tags = ["ablation", "fixed_pair_interpolation", "cifar10_cnn", "heterofl", "pair_a_b", "mix_08_02"]

[devices.rpi4]
model-rate = 0.5
batch-size = 8
max-train-examples = 4167
max-test-examples = 834

[devices.rpi5]
model-rate = 0.5
batch-size = 32
max-train-examples = 4167
max-test-examples = 834
