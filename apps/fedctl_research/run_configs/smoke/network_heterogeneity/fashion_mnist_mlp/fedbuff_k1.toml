[run]
method = "fedbuff"
task = "fashion_mnist_mlp"
seeds = [1337]

[server]
min-available-nodes = 4
min-train-nodes = 4
min-evaluate-nodes = 4
fraction-train = 1.0
fraction-evaluate = 1.0
capability-discovery-timeout-s = 120.0

[client]
local-epochs = 1
learning-rate = 0.01
batch-size = 32

[data]
partitioning = "iid"
partitioning-num-labels = 2
partitioning-dirichlet-alpha = 0.1
masked-cross-entropy = "auto"

[model]
global-model-rate = 1.0
default-model-rate = 1.0

[fedbuff]
buffer-size = 1
train-concurrency = 4
poll-interval-s = 1.0
num-server-steps = 2
evaluate-every-steps = 1
staleness-weighting = "polynomial"
staleness-alpha = 0.5

[evaluation]
client-eval-enabled = false
final-client-eval-enabled = true

[wandb]
enabled = true
group = "fedbuff-smoke-fashion_mnist_mlp"
tags = ["fedbuff", "smoke", "fashion_mnist_mlp", "k1"]

[devices.rpi4]
model-rate = 1.0
batch-size = 8
max-train-examples = 512
max-test-examples = 128

[devices.rpi5]
model-rate = 1.0
batch-size = 32
max-train-examples = 1024
max-test-examples = 256
