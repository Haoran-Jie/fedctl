---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart fedctl-submit
  ansible.builtin.systemd:
    name: fedctl-submit
    state: restarted

- name: Reload nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded

- name: Restart nginx
  ansible.builtin.systemd:
    name: nginx
    state: restarted
