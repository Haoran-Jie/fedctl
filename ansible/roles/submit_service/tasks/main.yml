---
- name: Ensure submit service dependencies
  ansible.builtin.apt:
    name:
      - git
      - python3
      - python3-pip
      - python3-venv
    state: present
    update_cache: true

- name: Ensure nginx is installed for submit reverse proxy
  ansible.builtin.apt:
    name: nginx
    state: present
  when: submit_reverse_proxy_enabled | default(false)

- name: Ensure submit service base directory exists
  ansible.builtin.file:
    path: "{{ submit_repo_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Ensure submit repository ownership is writable by ssh user
  ansible.builtin.file:
    path: "{{ submit_repo_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    recurse: true

- name: Check whether submit repository already exists
  ansible.builtin.stat:
    path: "{{ submit_repo_dir }}/.git"
  register: submit_repo_git_dir

- name: Read existing submit repository origin URL
  ansible.builtin.command:
    argv:
      - git
      - -C
      - "{{ submit_repo_dir }}"
      - config
      - --get
      - remote.origin.url
  register: submit_repo_origin_url
  changed_when: false
  failed_when: false
  become: false
  when: submit_repo_git_dir.stat.exists

- name: Rewrite submit repository origin URL when it differs from configured repo
  ansible.builtin.command:
    argv:
      - git
      - -C
      - "{{ submit_repo_dir }}"
      - remote
      - set-url
      - origin
      - "{{ submit_repo_url }}"
  become: false
  when:
    - submit_repo_git_dir.stat.exists
    - submit_repo_origin_url.stdout | trim | length > 0
    - submit_repo_origin_url.stdout | trim != submit_repo_url

- name: Check out fedctl repository
  ansible.builtin.git:
    repo: "{{ submit_repo_url }}"
    dest: "{{ submit_repo_dir }}"
    version: "{{ submit_repo_version }}"
    update: true
  become: false
  notify: Restart fedctl-submit

- name: Ensure submit service state directory exists
  ansible.builtin.file:
    path: "{{ submit_repo_dir }}/submit_service/state"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install submit service Python requirements
  ansible.builtin.pip:
    requirements: "{{ submit_repo_dir }}/submit_service/requirements.txt"
    virtualenv: "{{ submit_venv_path }}"
    virtualenv_command: python3 -m venv
  notify: Restart fedctl-submit

- name: Install fedctl package in submit service venv (editable)
  ansible.builtin.pip:
    name: "{{ submit_repo_dir }}"
    editable: true
    virtualenv: "{{ submit_venv_path }}"
    virtualenv_command: python3 -m venv
  notify: Restart fedctl-submit

- name: Ensure submit repo config directory exists
  ansible.builtin.file:
    path: "{{ submit_repo_config_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Write submit repo config file
  ansible.builtin.template:
    src: fedctl-submit-repo.yaml.j2
    dest: "{{ submit_repo_config_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart fedctl-submit

- name: Remove legacy submit repo config file path
  ansible.builtin.file:
    path: "{{ submit_legacy_repo_config_path }}"
    state: absent
  when:
    - submit_legacy_repo_config_path is defined
    - submit_legacy_repo_config_path | length > 0
    - submit_legacy_repo_config_path != submit_repo_config_path
  notify: Restart fedctl-submit

- name: Write submit service env file
  ansible.builtin.template:
    src: fedctl-submit.env.j2
    dest: /etc/fedctl-submit.env
    owner: root
    group: root
    mode: "0600"
  notify: Restart fedctl-submit

- name: Ensure AWS config directory exists for submit service user
  ansible.builtin.file:
    path: "{{ submit_aws_shared_credentials_file | dirname }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"
  when:
    - submit_aws_shared_credentials_file | length > 0
    - submit_aws_credentials_src | length > 0 or submit_aws_config_src | length > 0

- name: Write AWS credentials file for submit service
  ansible.builtin.copy:
    src: "{{ submit_aws_credentials_src }}"
    dest: "{{ submit_aws_shared_credentials_file }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  when:
    - submit_aws_shared_credentials_file | length > 0
    - submit_aws_credentials_src | length > 0
  no_log: true
  notify: Restart fedctl-submit

- name: Write AWS config file for submit service
  ansible.builtin.copy:
    src: "{{ submit_aws_config_src }}"
    dest: "{{ submit_aws_config_file }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  when:
    - submit_aws_config_file | length > 0
    - submit_aws_config_src | length > 0
  no_log: true
  notify: Restart fedctl-submit

- name: Write submit service systemd unit
  ansible.builtin.template:
    src: fedctl-submit.service.j2
    dest: /etc/systemd/system/fedctl-submit.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart fedctl-submit

- name: Ensure fedctl-submit service enabled and started
  ansible.builtin.systemd:
    name: fedctl-submit
    enabled: true
    state: started

- name: Write nginx site for submit service
  ansible.builtin.template:
    src: fedctl-submit.nginx.conf.j2
    dest: /etc/nginx/sites-available/fedctl-submit
    owner: root
    group: root
    mode: "0644"
  when: submit_reverse_proxy_enabled | default(false)
  notify: Reload nginx

- name: Enable nginx site for submit service
  ansible.builtin.file:
    src: /etc/nginx/sites-available/fedctl-submit
    dest: /etc/nginx/sites-enabled/fedctl-submit
    state: link
  when: submit_reverse_proxy_enabled | default(false)
  notify: Reload nginx

- name: Disable default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  when: submit_reverse_proxy_enabled | default(false)
  notify: Reload nginx

- name: Validate nginx configuration
  ansible.builtin.command:
    argv:
      - nginx
      - -t
  changed_when: false
  when: submit_reverse_proxy_enabled | default(false)

- name: Ensure nginx enabled and started
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
  when: submit_reverse_proxy_enabled | default(false)
