---
- name: Check Docker binary
  ansible.builtin.stat:
    path: /usr/bin/docker
  register: docker_bin

- name: Install Docker with upstream convenience script
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://get.docker.com | sh
  args:
    executable: /bin/bash
  when: not docker_bin.stat.exists

- name: Ensure Docker service is enabled and running
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Ensure ssh user is in docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

- name: Check existing daemon.json
  ansible.builtin.stat:
    path: /etc/docker/daemon.json
  register: daemon_json_stat

- name: Read existing daemon.json
  ansible.builtin.slurp:
    path: /etc/docker/daemon.json
  register: daemon_json_raw
  when: daemon_json_stat.stat.exists

- name: Parse existing daemon.json
  ansible.builtin.set_fact:
    docker_daemon_existing: >-
      {{
        (
          daemon_json_raw.content | b64decode | trim | length > 0
        )
        | ternary((daemon_json_raw.content | b64decode | from_json), {})
      }}
  when: daemon_json_stat.stat.exists

- name: Default daemon config when file does not exist
  ansible.builtin.set_fact:
    docker_daemon_existing: {}
  when: not daemon_json_stat.stat.exists

- name: Merge insecure registries into daemon config
  ansible.builtin.set_fact:
    docker_daemon_merged: >-
      {{
        docker_daemon_existing
        | combine(
            {
              'insecure-registries': (
                (docker_daemon_existing['insecure-registries'] | default([]))
                + docker_insecure_registries
              ) | unique
            },
            recursive=True
          )
      }}

- name: Write merged daemon.json
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: "{{ docker_daemon_merged | to_nice_json }}\n"
    owner: root
    group: root
    mode: "0644"
  notify: Restart docker

- name: Determine whether Docker image cleanup is enabled for this host
  ansible.builtin.set_fact:
    docker_image_cleanup_effective: >-
      {{
        (docker_image_cleanup_enabled | bool)
        and (
          (docker_image_cleanup_node_classes | default([]) | length == 0)
          or ((nomad_node_class | default('')) in (docker_image_cleanup_node_classes | default([])))
        )
      }}

- name: Install Docker image cleanup service
  ansible.builtin.template:
    src: fedctl-docker-image-cleanup.service.j2
    dest: "/etc/systemd/system/{{ docker_image_cleanup_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  when: docker_image_cleanup_effective | bool

- name: Install Docker image cleanup timer
  ansible.builtin.template:
    src: fedctl-docker-image-cleanup.timer.j2
    dest: "/etc/systemd/system/{{ docker_image_cleanup_service_name }}.timer"
    owner: root
    group: root
    mode: "0644"
  when: docker_image_cleanup_effective | bool

- name: Enable and start Docker image cleanup timer
  ansible.builtin.systemd:
    name: "{{ docker_image_cleanup_service_name }}.timer"
    enabled: true
    state: started
    daemon_reload: true
  when: docker_image_cleanup_effective | bool

- name: Disable Docker image cleanup timer when cleanup is not enabled for this host
  ansible.builtin.systemd:
    name: "{{ docker_image_cleanup_service_name }}.timer"
    enabled: false
    state: stopped
    daemon_reload: true
  failed_when: false
  when: not (docker_image_cleanup_effective | bool)

- name: Remove Docker image cleanup timer when cleanup is not enabled for this host
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ docker_image_cleanup_service_name }}.timer"
    state: absent
  when: not (docker_image_cleanup_effective | bool)

- name: Remove Docker image cleanup service when cleanup is not enabled for this host
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ docker_image_cleanup_service_name }}.service"
    state: absent
  when: not (docker_image_cleanup_effective | bool)

- name: Reload systemd after removing Docker image cleanup units
  ansible.builtin.systemd:
    daemon_reload: true
  when: not (docker_image_cleanup_effective | bool)
