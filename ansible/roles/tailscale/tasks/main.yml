---
- name: Check Tailscale binary
  ansible.builtin.stat:
    path: /usr/bin/tailscale
  register: tailscale_bin

- name: Install Tailscale with official install script
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://tailscale.com/install.sh | sh
  args:
    executable: /bin/bash
  when:
    - tailscale_enabled
    - not tailscale_bin.stat.exists

- name: Ensure tailscaled service is enabled and running
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started
  when: tailscale_enabled

- name: Fetch Tailscale status
  ansible.builtin.command: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false
  when: tailscale_enabled

- name: Parse Tailscale status
  ansible.builtin.set_fact:
    tailscale_status_json: "{{ tailscale_status.stdout | from_json }}"
  when:
    - tailscale_enabled
    - tailscale_status.rc == 0
    - tailscale_status.stdout | trim | length > 0

- name: Join Tailscale with inventory hostname
  ansible.builtin.shell: >-
    tailscale up
    --auth-key={{ tailscale_auth_key | quote }}
    --hostname={{ tailscale_hostname | quote }}
    {% if tailscale_enable_ssh %}--ssh{% endif %}
  args:
    executable: /bin/bash
  register: tailscale_up
  changed_when: true
  no_log: true
  when:
    - tailscale_enabled
    - tailscale_auth_key | length > 0
    - tailscale_status.rc != 0
      or tailscale_status_json is not defined
      or tailscale_status_json.BackendState | default('') != 'Running'
      or tailscale_status_json.Self is not defined
      or tailscale_status_json.Self.HostName | default('') != tailscale_hostname
