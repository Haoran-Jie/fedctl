---
- name: Check whether nmcli is available
  ansible.builtin.shell: command -v nmcli
  args:
    executable: /bin/bash
  register: common_nmcli
  changed_when: false
  failed_when: false

- name: Get active Wi-Fi connection name
  ansible.builtin.shell: |
    set -eu
    nmcli -t -f NAME,DEVICE connection show --active | awk -F: '$2 == "wlan0" {print $1; exit}'
  args:
    executable: /bin/bash
  register: common_wifi_conn
  changed_when: false
  when:
    - network_prefer_wifi | bool
    - common_nmcli.rc == 0

- name: Get active Ethernet connection name
  ansible.builtin.shell: |
    set -eu
    nmcli -t -f NAME,DEVICE connection show --active | awk -F: '$2 == "eth0" {print $1; exit}'
  args:
    executable: /bin/bash
  register: common_eth_conn
  changed_when: false
  when:
    - network_prefer_wifi | bool
    - common_nmcli.rc == 0

- name: Prefer Wi-Fi route metric during provisioning
  ansible.builtin.command:
    argv:
      - nmcli
      - connection
      - modify
      - "{{ common_wifi_conn.stdout }}"
      - ipv4.route-metric
      - "{{ network_wifi_route_metric | string }}"
      - ipv6.route-metric
      - "{{ network_wifi_route_metric | string }}"
  when:
    - network_prefer_wifi | bool
    - common_nmcli.rc == 0
    - common_wifi_conn.stdout | length > 0

- name: Keep Ethernet available but non-preferred
  ansible.builtin.command:
    argv:
      - nmcli
      - connection
      - modify
      - "{{ common_eth_conn.stdout }}"
      - ipv4.never-default
      - "yes"
      - ipv6.never-default
      - "yes"
      - ipv4.route-metric
      - "{{ network_eth_route_metric | string }}"
      - ipv6.route-metric
      - "{{ network_eth_route_metric | string }}"
  when:
    - network_prefer_wifi | bool
    - common_nmcli.rc == 0
    - common_wifi_conn.stdout | length > 0
    - common_eth_conn.stdout | length > 0

- name: Bring Wi-Fi connection back up after metric change
  ansible.builtin.command:
    argv:
      - nmcli
      - connection
      - up
      - "{{ common_wifi_conn.stdout }}"
  when:
    - network_prefer_wifi | bool
    - common_nmcli.rc == 0
    - common_wifi_conn.stdout | length > 0

- name: Disconnect Ethernet during Wi-Fi-first provisioning
  ansible.builtin.command:
    argv:
      - nmcli
      - device
      - disconnect
      - eth0
  register: common_eth_disconnect
  changed_when: "'successfully disconnected' in (common_eth_disconnect.stdout | lower)"
  failed_when: false
  when:
    - network_prefer_wifi | bool
    - common_nmcli.rc == 0
    - common_wifi_conn.stdout | length > 0
    - common_eth_conn.stdout | length > 0

- name: Ensure systemd-timesyncd is enabled and running
  ansible.builtin.systemd:
    name: systemd-timesyncd
    enabled: true
    state: started

- name: Wait for NTP synchronization before apt
  ansible.builtin.command:
    argv:
      - timedatectl
      - show
      - -p
      - NTPSynchronized
      - --value
  register: common_ntp_sync
  changed_when: false
  until: common_ntp_sync.stdout | trim == 'yes'
  retries: 20
  delay: 3

- name: Install baseline packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - git
      - python3
      - python3-pip
      - python3-venv
      - unzip
    state: present
    update_cache: true

- name: Set system hostname from inventory
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Ensure localhost hostname mapping exists
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\\.0\\.1\\.1\\s+'
    line: "127.0.1.1 {{ inventory_hostname }}"
    state: present
