---
- name: Baseline packages on all RPis
  hosts: all
  become: true
  roles:
    - role: common

- name: Configure Tailscale on selected nodes
  hosts: tailscale_nodes
  become: true
  pre_tasks:
    - name: Load local Tailscale secrets when present
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/group_vars/tailscale_nodes.local.yml"
      ignore_errors: true
  roles:
    - role: tailscale

- name: Configure Nomad server nodes
  hosts: nomad_servers
  become: true
  roles:
    - role: nomad
      nomad_role: server

- name: Configure Docker on Nomad clients
  hosts: nomad_clients:registry_hosts
  become: true
  roles:
    - role: docker

- name: Configure local Docker registry
  hosts: registry_hosts
  become: true
  roles:
    - role: registry

- name: Configure Nomad client nodes
  hosts: nomad_clients
  become: true
  roles:
    - role: nomad
      nomad_role: client

- name: Deploy submit service
  hosts: submit_service
  become: true
  roles:
    - role: submit_service

- name: Validate Nomad server and client readiness
  hosts: nomad_servers
  become: true
  tasks:
    - name: Check Nomad leader endpoint
      ansible.builtin.uri:
        url: http://127.0.0.1:4646/v1/status/leader
        method: GET
        return_content: true
        status_code: 200
      register: nomad_leader
      failed_when:
        - nomad_leader.content | trim | length == 0
        - nomad_leader.content | trim == '""'

    - name: Fetch Nomad node status
      ansible.builtin.command: nomad node status -json
      register: nomad_node_status
      changed_when: false

    - name: Validate expected Nomad clients are ready
      ansible.builtin.assert:
        that:
          - ready_nomad_clients | length == groups['nomad_clients'] | length
          - expected_nomad_clients | difference(ready_nomad_clients) | length == 0
        fail_msg: >-
          Expected ready Nomad clients {{ expected_nomad_clients }}, got
          {{ ready_nomad_clients }}
      vars:
        nomad_nodes: "{{ nomad_node_status.stdout | from_json }}"
        ready_nomad_clients: >-
          {{
            nomad_nodes
            | selectattr('Status', 'equalto', 'ready')
            | map(attribute='Name')
            | list
          }}
        expected_nomad_clients: "{{ groups['nomad_clients'] | list }}"
      when: groups['nomad_clients'] | difference(ansible_play_hosts_all) | length == 0

- name: Validate local Docker registry
  hosts: registry_hosts
  become: true
  tasks:
    - name: Check registry API endpoint
      ansible.builtin.uri:
        url: http://127.0.0.1:5000/v2/
        method: GET
        status_code: 200

- name: Validate submit service
  hosts: submit_service
  become: true
  tasks:
    - name: Check submit service login page
      ansible.builtin.uri:
        url: http://127.0.0.1:8080/ui/login
        method: GET
        status_code: 200

    - name: Check submit-service presign readiness
      ansible.builtin.uri:
        url: http://127.0.0.1:8080/v1/presign
        method: POST
        headers:
          Authorization: "Bearer {{ submit_tokens[0] }}"
        body_format: json
        body:
          bucket: fedctl-submits
          key: fedctl-submits/ansible-presign-check.txt
          method: PUT
          expires: 900
        status_code: 200
      when:
        - submit_tokens | length > 0
        - submit_aws_shared_credentials_file | length > 0
        - submit_aws_config_file | length > 0

- name: Validate Tailscale connectivity
  hosts: tailscale_nodes
  become: true
  tasks:
    - name: Check Tailscale status
      ansible.builtin.command: tailscale status --json
      register: tailscale_validate_status
      changed_when: false
      when: tailscale_enabled

    - name: Validate Tailscale backend state is running
      ansible.builtin.assert:
        that:
          - (tailscale_validate_status.stdout | from_json).BackendState == 'Running'
        fail_msg: "Tailscale is not running on {{ inventory_hostname }}"
      when: tailscale_enabled
