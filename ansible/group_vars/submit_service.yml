---
submit_repo_url: "https://github.com/Haoran-Jie/fedctl.git"
submit_repo_version: "master"
submit_repo_dir: "/opt/fedctl"
submit_venv_path: "/opt/fedctl/.venv"
submit_db_url: "sqlite:////opt/fedctl/submit_service/state/submit.db"
submit_dispatch_mode: "queue"
submit_autopurge_completed_after_s: 60
submit_allow_unauth: false
submit_ui_enabled: true
submit_ui_session_secret: "ad9acb3eaccf734ffe54f409756aa64c746053221be7bbf609dc9c32b8957193"
submit_ui_cookie_name: "fedctl_submit_session"
submit_ui_cookie_secure: false
submit_aws_shared_credentials_file: "/home/rpi/.aws/credentials"
submit_aws_config_file: "/home/rpi/.aws/config"
submit_aws_credentials_src: "{{ lookup('env', 'HOME') }}/.aws/credentials"
submit_aws_config_src: "{{ lookup('env', 'HOME') }}/.aws/config"
submit_aws_profile: "default"
submit_aws_region: "eu-north-1"
submit_service_public_endpoint: "http://10.100.2.142:8080"
submit_repo_config_path: "/etc/fedctl/cluster-fedctl.yaml"
submit_legacy_repo_config_path: "/opt/fedctl/.fedctl/fedctl.yaml"
submit_cluster_repo_config:
  deploy:
    supernodes:
      rpi: 2
      jetson: 2
    placement:
      allow_oversubscribe: true
      spread_across_hosts: true
    resources:
      supernode:
        default:
          cpu: 500
          mem: 512
        rpi:
          cpu: 500
          mem: 512
        jetson:
          cpu: 1000
          mem: 1024
    network:
      image: jiahborcn/netem:latest
      default_profile: none
      apply:
        superexec_serverapp: false
        superexec_clientapp: true
      profiles:
        none: {}
        low:
          delay_ms: 0
          jitter_ms: 0
          loss_pct: 0
        med:
          delay_ms: 60
          jitter_ms: 10
          loss_pct: 1.0
          rate_mbit: 50
          rate_latency_ms: 50
          rate_burst_kbit: 256
        high:
          delay_ms: 120
          jitter_ms: 25
          loss_pct: 2.5
          rate_mbit: 20
          rate_latency_ms: 50
          rate_burst_kbit: 256
  submit:
    node_class: submit
    image: jiahborcn/fedctl-submit:latest
    artifact_store: s3+presign://fedctl-submits/fedctl-submits
    endpoint: "{{ submit_service_public_endpoint }}"
    token: flwruser1
    user: samuel
  submit-service:
    endpoint: "http://{{ cluster_nomad_server_host }}:8080"
    tokens: token1,token2
    allow_unauth: true
    nomad_endpoint: http://127.0.0.1:4646
    nomad_token: 87391ae3-e54b-05f6-869d-69587f58c56c
    nomad_namespace: default
    dispatch_mode: queue
    dispatch_interval: 10
    datacenter: dc1
    default_priority: 50
    docker_socket: /var/run/docker.sock
  image_registry: "{{ cluster_registry_hostport }}"

# Replace with your real tokens or use ansible-vault.
submit_tokens:
  - "flwruser1"
  - "flwruser2"
  - "flwruser3"
  - "flwruser4"
  - "flwruser5"
  - "flwruser6"
  - "flwruser7"
  - "flwruser8"
  - "flwruser9"
  - "flwruser10"

submit_token_map:
  flwruser1:
    name: flwruser1
    role: admin
  flwruser2:
    name: flwruser2
    role: user
  flwruser3:
    name: flwruser3
    role: user
  flwruser4:
    name: flwruser4
    role: user
  flwruser5:
    name: flwruser5
    role: user
  flwruser6:
    name: flwruser6
    role: user
  flwruser7:
    name: flwruser7
    role: user
  flwruser8:
    name: flwruser8
    role: user
  flwruser9:
    name: flwruser9
    role: user
  flwruser10:
    name: flwruser10
    role: user

# If omitted, defaults to the first nomad server host in inventory.
# submit_nomad_endpoint: "http://{{ cluster_nomad_server_host }}:4646"
