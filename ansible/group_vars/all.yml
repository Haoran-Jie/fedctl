---
# Global defaults
nomad_version: "1.11.1"
nomad_datacenter: "dc1"
nomad_data_dir: "/opt/nomad/data"
nomad_bind_addr: "0.0.0.0"
nomad_advertise_ip: "{{ cluster_node_ip | default(ansible_host) }}"

# Cluster control-plane addressing derived from inventory.
cluster_nomad_server_host: "{{ hostvars[groups['nomad_servers'][0]].cluster_node_ip | default(hostvars[groups['nomad_servers'][0]].ansible_host) }}"
cluster_registry_hostport: "{{ cluster_nomad_server_host }}:5000"
cluster_registry_tailscale_hostport: "{{ hostvars[groups['registry_hosts'][0]].tailscale_ip | default(hostvars[groups['registry_hosts'][0]].ansible_host) }}:5000"

# Keep list in sync with your server quorum.
nomad_server_rpc_endpoints:
  - "{{ cluster_nomad_server_host }}:4647"

# Docker registry config used by all Nomad clients.
docker_insecure_registries:
  - "{{ cluster_registry_hostport }}"
  - "{{ cluster_registry_tailscale_hostport }}"

# Local registry retention defaults. This keeps the registry catalog manageable,
# but does not reclaim blob storage until a future offline GC maintenance step.
registry_delete_enabled: true
registry_retention_enabled: true
registry_retention_keep_tags: 10
registry_retention_keep_latest: true
registry_retention_repo_patterns:
  - "*-superexec"
registry_retention_schedule: "03:30"
registry_retention_dry_run: false

# Provisioning network preference. Campus Ethernet is now the intended primary
# path, so disable the legacy Wi-Fi-first tuning in the network_policy role.
network_prefer_wifi: false
network_wifi_route_metric: 700
network_eth_route_metric: 50
