<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}fedctl submit service{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ request.url_for('ui-static', path='flwr.png') }}">
    <link rel="stylesheet" href="{{ request.url_for('ui-static', path='style.css') }}">
  </head>
  <body>
    <header class="topbar">
      <div class="brand-wrap">
        <a class="brand" href="/ui/submissions">fedctl submit service</a>
      </div>
      {% if principal %}
      <nav class="nav">
        <button
          type="button"
          class="command-palette-trigger"
          data-command-palette-open
          aria-haspopup="dialog"
          aria-controls="command-palette-dialog"
        >
          <span class="command-palette-trigger-label">Command menu</span>
          <span class="command-palette-trigger-shortcut" aria-hidden="true">Ctrl/Cmd+K</span>
        </button>
        <a class="nav-link" href="/ui/submissions">Submissions</a>
        <a class="nav-link" href="/ui/help">Help</a>
        {% if principal.role == 'admin' %}
        <a class="nav-link" href="/ui/nodes">Nodes</a>
        {% endif %}
        <form method="post" action="/ui/logout">
          <button type="submit" class="topbar-button">Log out {{ principal.name }}</button>
        </form>
      </nav>
      {% endif %}
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
    {% if principal %}
    <script id="command-palette-data" type="application/json">{{ palette_commands | tojson }}</script>
    <div class="command-palette-shell" data-command-palette hidden>
      <div class="command-palette-backdrop" data-command-palette-close></div>
      <div class="command-palette-dialog" id="command-palette-dialog" role="dialog" aria-modal="true" aria-labelledby="command-palette-title">
        <div class="command-palette-head">
          <span class="command-palette-title" id="command-palette-title">Command menu</span>
          <button type="button" class="command-palette-close" data-command-palette-close aria-label="Close command menu">Esc</button>
        </div>
        <label class="visually-hidden" for="command-palette-input">Search commands</label>
        <div class="command-palette-input-wrap">
          <input
            id="command-palette-input"
            type="search"
            class="command-palette-input"
            data-command-palette-input
            placeholder="Search pages, filters, and sections"
            autocomplete="off"
            spellcheck="false"
          >
          <span class="command-palette-input-hint">Arrows to move, Enter to open</span>
        </div>
        <div class="command-palette-results" data-command-palette-results></div>
      </div>
    </div>
    {% endif %}
    <div class="toast-stack" data-toast-root aria-live="polite" aria-atomic="true"></div>
    <script>
      (() => {
        const toastRoot = document.querySelector('[data-toast-root]');
        if (!toastRoot) return;

        const removeNoticeFromUrl = () => {
          const url = new URL(window.location.href);
          if (!url.searchParams.has('notice')) return;
          url.searchParams.delete('notice');
          url.searchParams.delete('notice_kind');
          const next = `${url.pathname}${url.search}${url.hash}`;
          window.history.replaceState({}, '', next);
        };

        const toastGlyph = (kind) => {
          if (kind === 'error') {
            return `
              <span class="toast-glyph toast-glyph-error">
                <span></span>
                <span></span>
              </span>
            `;
          }
          return `
            <span class="toast-glyph toast-glyph-success">
              <span></span>
            </span>
          `;
        };

        const dismissToast = (toast) => {
          if (!toast || toast.dataset.dismissed === 'true') return;
          toast.dataset.dismissed = 'true';
          if (toast._timeoutId) {
            window.clearTimeout(toast._timeoutId);
          }
          toast.classList.remove('is-visible');
          toast.classList.add('is-leaving');
          window.setTimeout(() => toast.remove(), 220);
        };

        const scheduleToastDismiss = (toast, delay = 2600) => {
          if (toast._timeoutId) {
            window.clearTimeout(toast._timeoutId);
          }
          toast._timeoutId = window.setTimeout(() => dismissToast(toast), delay);
        };

        const showToast = (message, kind = 'success') => {
          if (!message) return;
          const toast = document.createElement('div');
          toast.className = `toast toast-${kind}`;
          toast.innerHTML = `
            <span class="toast-icon" aria-hidden="true">${toastGlyph(kind)}</span>
            <span class="toast-message">${message}</span>
            <button type="button" class="toast-close" aria-label="Dismiss notification">
              <span></span>
              <span></span>
            </button>
          `;
          const closeButton = toast.querySelector('.toast-close');
          closeButton?.addEventListener('click', () => dismissToast(toast));
          toast.addEventListener('mouseenter', () => {
            if (toast._timeoutId) {
              window.clearTimeout(toast._timeoutId);
            }
          });
          toast.addEventListener('mouseleave', () => scheduleToastDismiss(toast, 1200));
          toastRoot.appendChild(toast);
          window.requestAnimationFrame(() => {
            toast.classList.add('is-visible');
          });
          scheduleToastDismiss(toast);
        };

        const copyText = async (value) => {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(value);
            return;
          }
          const el = document.createElement('textarea');
          el.value = value;
          el.setAttribute('readonly', '');
          el.style.position = 'absolute';
          el.style.left = '-9999px';
          document.body.appendChild(el);
          el.select();
          document.execCommand('copy');
          document.body.removeChild(el);
        };

        const syncStickyShells = () => {
          const topbar = document.querySelector('.topbar');
          const stickyOffset = topbar ? Math.ceil(topbar.offsetHeight + 8) : 90;
          document.documentElement.style.setProperty('--sticky-top-offset', `${stickyOffset}px`);
          document.querySelectorAll('[data-sticky-shell]').forEach((shell) => {
            const panel = shell.closest('[data-sticky-panel]');
            if (!panel) return;
            panel.style.setProperty('--sticky-shell-height', `${Math.ceil(shell.offsetHeight)}px`);
          });
        };

        window.fedctlUI = {
          showToast,
          syncStickyShells,
          async copy(button) {
            const value = button.dataset.copy || '';
            if (!value) return;
            const originalLabel = button.dataset.copyLabel || button.textContent.trim();
            const copiedLabel = button.dataset.copyDoneLabel || 'Copied';
            const labelNode =
              button.querySelector('[data-copy-label-node]') ||
              button.querySelector('.copy-button-label');
            try {
              await copyText(value);
              button.dataset.copyState = 'done';
              if (labelNode) {
                labelNode.textContent = copiedLabel;
              } else {
                button.textContent = copiedLabel;
              }
              window.setTimeout(() => {
                button.dataset.copyState = 'idle';
                if (labelNode) {
                  labelNode.textContent = originalLabel;
                } else {
                  button.textContent = originalLabel;
                }
              }, 1200);
              showToast(button.dataset.copyToast || 'Copied to clipboard');
            } catch (error) {
              showToast(button.dataset.copyErrorToast || 'Copy failed', 'error');
            }
          },
        };

        const paletteShell = document.querySelector('[data-command-palette]');
        const paletteTrigger = document.querySelector('[data-command-palette-open]');
        const paletteInput = document.querySelector('[data-command-palette-input]');
        const paletteResults = document.querySelector('[data-command-palette-results]');
        const paletteSource = document.getElementById('command-palette-data');
        const paletteCloseButtons = Array.from(document.querySelectorAll('[data-command-palette-close]'));
        const groupOrder = {
          Navigation: 0,
          Submissions: 1,
          Inventory: 2,
          Help: 3,
          Submission: 4,
        };
        let paletteCommands = [];
        let paletteOpen = false;
        let paletteSelection = 0;
        let paletteMatches = [];
        let palettePreviousFocus = null;

        const isEditableTarget = (target) => {
          if (!(target instanceof Element)) return false;
          return Boolean(target.closest('input, textarea, select, [contenteditable="true"]'));
        };

        if (paletteSource?.textContent) {
          try {
            paletteCommands = JSON.parse(paletteSource.textContent);
          } catch (error) {
            paletteCommands = [];
          }
        }

        const rankPaletteCommand = (command, query) => {
          if (!query) return 1;
          const normalizedQuery = query.toLowerCase();
          const label = String(command.label || '').toLowerCase();
          const group = String(command.group || '').toLowerCase();
          const keywords = Array.isArray(command.keywords)
            ? command.keywords.map((value) => String(value || '').toLowerCase())
            : [];
          const labelWords = label.split(/[\s/:-]+/).filter(Boolean);
          if (label === normalizedQuery) return 1200;
          if (keywords.includes(normalizedQuery)) return 1080;
          if (label.startsWith(normalizedQuery)) return 980;
          if (labelWords.some((word) => word.startsWith(normalizedQuery))) return 860;
          if (keywords.some((word) => word.startsWith(normalizedQuery))) return 760;
          const haystack = [label, group, ...keywords].join(' ');
          if (haystack.includes(normalizedQuery)) return 560;
          return 0;
        };

        const buildPaletteMatches = (query) => {
          return paletteCommands
            .map((command, index) => ({
              ...command,
              _order: index,
              _score: rankPaletteCommand(command, query),
            }))
            .filter((command) => (query ? command._score > 0 : true))
            .sort((left, right) => {
              if (right._score !== left._score) return right._score - left._score;
              const leftGroup = groupOrder[left.group] ?? 99;
              const rightGroup = groupOrder[right.group] ?? 99;
              if (leftGroup !== rightGroup) return leftGroup - rightGroup;
              return left._order - right._order;
            });
        };

        const renderPaletteResults = () => {
          if (!paletteResults) return;
          paletteResults.innerHTML = '';
          if (!paletteMatches.length) {
            const empty = document.createElement('div');
            empty.className = 'command-palette-empty';
            empty.textContent = 'No matching commands';
            paletteResults.appendChild(empty);
            return;
          }

          let currentGroup = '';
          let groupSection = null;
          let groupList = null;
          paletteMatches.forEach((command, index) => {
            if (command.group !== currentGroup) {
              currentGroup = command.group;
              groupSection = document.createElement('section');
              groupSection.className = 'command-palette-group';
              const heading = document.createElement('div');
              heading.className = 'command-palette-group-label';
              heading.textContent = currentGroup;
              groupList = document.createElement('div');
              groupList.className = 'command-palette-group-list';
              groupSection.appendChild(heading);
              groupSection.appendChild(groupList);
              paletteResults.appendChild(groupSection);
            }
            if (!groupList) return;
            const item = document.createElement('button');
            item.type = 'button';
            item.className = 'command-palette-item';
            if (index === paletteSelection) {
              item.classList.add('is-active');
            }
            item.dataset.paletteIndex = String(index);
            item.dataset.href = command.href;

            const label = document.createElement('span');
            label.className = 'command-palette-item-label';
            label.textContent = command.label;
            const meta = document.createElement('span');
            meta.className = 'command-palette-item-meta';
            meta.textContent = command.group;
            item.appendChild(label);
            item.appendChild(meta);
            groupList.appendChild(item);
          });
          window.requestAnimationFrame(() => {
            const activeItem = paletteResults.querySelector('.command-palette-item.is-active');
            activeItem?.scrollIntoView({ block: 'nearest' });
          });
        };

        const syncPalette = () => {
          const query = (paletteInput?.value || '').trim();
          paletteMatches = buildPaletteMatches(query);
          paletteSelection = Math.max(0, Math.min(paletteSelection, paletteMatches.length - 1));
          renderPaletteResults();
        };

        const closePalette = () => {
          if (!paletteShell || !paletteOpen) return;
          paletteOpen = false;
          paletteShell.hidden = true;
          document.body.classList.remove('palette-open');
          if (paletteInput) {
            paletteInput.value = '';
          }
          paletteMatches = [];
          paletteSelection = 0;
          if (palettePreviousFocus instanceof HTMLElement) {
            palettePreviousFocus.focus({ preventScroll: true });
          }
        };

        const openPalette = () => {
          if (!paletteShell || !paletteInput) return;
          palettePreviousFocus = document.activeElement;
          paletteOpen = true;
          paletteShell.hidden = false;
          document.body.classList.add('palette-open');
          paletteInput.value = '';
          paletteSelection = 0;
          syncPalette();
          window.requestAnimationFrame(() => {
            paletteInput.focus({ preventScroll: true });
          });
        };

        const activatePaletteCommand = (command) => {
          if (!command?.href) return;
          closePalette();
          window.location.assign(command.href);
        };

        paletteTrigger?.addEventListener('click', () => {
          if (paletteOpen) {
            closePalette();
            return;
          }
          openPalette();
        });

        paletteCloseButtons.forEach((button) => {
          button.addEventListener('click', closePalette);
        });

        paletteInput?.addEventListener('input', () => {
          paletteSelection = 0;
          syncPalette();
        });

        paletteInput?.addEventListener('keydown', (event) => {
          if (!paletteMatches.length && event.key !== 'Escape') return;
          if (event.key === 'ArrowDown') {
            event.preventDefault();
            paletteSelection = Math.min(paletteSelection + 1, paletteMatches.length - 1);
            renderPaletteResults();
          } else if (event.key === 'ArrowUp') {
            event.preventDefault();
            paletteSelection = Math.max(paletteSelection - 1, 0);
            renderPaletteResults();
          } else if (event.key === 'Enter') {
            event.preventDefault();
            activatePaletteCommand(paletteMatches[paletteSelection]);
          } else if (event.key === 'Escape') {
            event.preventDefault();
            closePalette();
          }
        });

        paletteResults?.addEventListener('click', (event) => {
          if (!(event.target instanceof Element)) return;
          const item = event.target.closest('[data-palette-index]');
          if (!(item instanceof HTMLElement)) return;
          const index = Number.parseInt(item.dataset.paletteIndex || '-1', 10);
          if (Number.isNaN(index) || index < 0 || index >= paletteMatches.length) return;
          activatePaletteCommand(paletteMatches[index]);
        });

        document.addEventListener('keydown', (event) => {
          if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'k') {
            if (isEditableTarget(event.target)) return;
            event.preventDefault();
            if (paletteOpen) {
              closePalette();
            } else {
              openPalette();
            }
            return;
          }
          if (event.key === 'Escape' && paletteOpen) {
            event.preventDefault();
            closePalette();
          }
        });

        document.addEventListener('click', (event) => {
          const button = event.target.closest('[data-copy]');
          if (!button) return;
          event.preventDefault();
          if (!button.dataset.copyEnhanced) {
            const label = button.dataset.copyLabel || button.textContent.trim() || 'Copy';
            button.dataset.copyLabel = label;
            button.dataset.copyEnhanced = 'true';
            button.dataset.copyState = button.dataset.copyState || 'idle';
            button.classList.add('copy-action');
            button.innerHTML = `
              <span class="copy-button-icon" aria-hidden="true">
                <span class="copy-glyph copy-glyph-copy"></span>
                <span class="copy-glyph copy-glyph-check"></span>
              </span>
              <span class="copy-button-label" data-copy-label-node>${label}</span>
            `;
          }
          window.fedctlUI.copy(button);
        });

        document.querySelectorAll('[data-copy]').forEach((button) => {
          if (button.dataset.copyEnhanced) return;
          const label = button.dataset.copyLabel || button.textContent.trim() || 'Copy';
          button.dataset.copyLabel = label;
          button.dataset.copyEnhanced = 'true';
          button.dataset.copyState = button.dataset.copyState || 'idle';
          button.classList.add('copy-action');
          button.innerHTML = `
            <span class="copy-button-icon" aria-hidden="true">
              <span class="copy-glyph copy-glyph-copy"></span>
              <span class="copy-glyph copy-glyph-check"></span>
            </span>
            <span class="copy-button-label" data-copy-label-node>${label}</span>
          `;
        });

        document.querySelectorAll('[data-auto-submit]').forEach((input) => {
          const form = input.form;
          if (!form) return;
          const delay = Number.parseInt(input.dataset.autoSubmit || '250', 10);
          let timeoutId = null;
          const submit = () => form.requestSubmit();
          input.addEventListener('input', () => {
            if (timeoutId !== null) {
              window.clearTimeout(timeoutId);
            }
            timeoutId = window.setTimeout(submit, Number.isNaN(delay) ? 250 : delay);
          });
          input.addEventListener('search', submit);
        });

        document.querySelectorAll('[data-segmented-control]').forEach((control) => {
          control.querySelectorAll('[data-segment-button]').forEach((button) => {
            button.addEventListener('click', (event) => {
              const form = button.form;
              if (!form) return;
              const hiddenStatus = form.querySelector('input[type="hidden"][name="status"]');
              if (hiddenStatus) {
                hiddenStatus.value = button.value;
              }
            });
          });
        });

        const helpNavLinks = Array.from(document.querySelectorAll('[data-help-nav-link]'));
        const helpSections = Array.from(document.querySelectorAll('[data-help-section][id]'));
        const backToTopButton = document.querySelector('[data-back-to-top]');

        const syncHelpNavigation = () => {
          if (!helpNavLinks.length && !backToTopButton) return;
          const topbar = document.querySelector('.topbar');
          const offset = topbar ? topbar.offsetHeight + 28 : 112;
          let activeId = helpSections[0]?.id || '';
          helpSections.forEach((section) => {
            if (section.getBoundingClientRect().top - offset <= 0) {
              activeId = section.id;
            }
          });
          helpNavLinks.forEach((link) => {
            const targetId = (link.getAttribute('href') || '').replace(/^#/, '');
            if (targetId === activeId) {
              link.dataset.active = 'true';
            } else {
              delete link.dataset.active;
            }
          });
          if (backToTopButton) {
            backToTopButton.classList.toggle('is-visible', window.scrollY > 320);
          }
        };

        backToTopButton?.addEventListener('click', () => {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        const noticeUrl = new URL(window.location.href);
        const noticeMessage = noticeUrl.searchParams.get('notice');
        if (noticeMessage) {
          showToast(noticeMessage, noticeUrl.searchParams.get('notice_kind') || 'success');
          removeNoticeFromUrl();
        }

        const sync = () => syncStickyShells();
        window.addEventListener('load', sync);
        window.addEventListener('resize', sync);
        window.addEventListener('scroll', syncHelpNavigation, { passive: true });
        window.addEventListener('resize', syncHelpNavigation);
        window.addEventListener('hashchange', syncHelpNavigation);
        sync();
        syncHelpNavigation();
      })();
    </script>
  </body>
</html>
