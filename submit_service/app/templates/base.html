<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}fedctl submit service{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ request.url_for('ui-static', path='fedctl-circle.png') }}">
    <link rel="stylesheet" href="{{ request.url_for('ui-static', path='style.css') }}">
  </head>
  <body>
    <header class="topbar">
      <div class="brand-wrap">
        <a class="brand" href="/ui/submissions" aria-label="fedctl submit service home">
          <span class="brand-wordmark">fedctl</span>
        </a>
        <p class="subtitle">submit service</p>
      </div>
      {% if principal %}
      <nav class="nav">
        <a class="nav-link{% if '/ui/submissions' in request.url.path %} is-active{% endif %}" href="/ui/submissions">Submissions</a>
        <a class="nav-link{% if '/ui/help' in request.url.path %} is-active{% endif %}" href="/ui/help">Help</a>
        {% if principal.role == 'admin' %}
        <a class="nav-link{% if '/ui/nodes' in request.url.path %} is-active{% endif %}" href="/ui/nodes">Nodes</a>
        {% endif %}
        <form method="post" action="/ui/logout">
          <button type="submit" class="topbar-button">Log out {{ principal.name }}</button>
        </form>
      </nav>
      {% endif %}
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
    <div class="toast-stack" data-toast-root aria-live="polite" aria-atomic="true"></div>
    <script>
      (() => {
        const toastRoot = document.querySelector('[data-toast-root]');
        if (!toastRoot) return;

        const removeNoticeFromUrl = () => {
          const url = new URL(window.location.href);
          if (!url.searchParams.has('notice')) return;
          url.searchParams.delete('notice');
          url.searchParams.delete('notice_kind');
          const next = `${url.pathname}${url.search}${url.hash}`;
          window.history.replaceState({}, '', next);
        };

        const toastGlyph = (kind) => {
          if (kind === 'error') {
            return `
              <span class="toast-glyph toast-glyph-error">
                <span></span>
                <span></span>
              </span>
            `;
          }
          return `
            <span class="toast-glyph toast-glyph-success">
              <span></span>
            </span>
          `;
        };

        const dismissToast = (toast) => {
          if (!toast || toast.dataset.dismissed === 'true') return;
          toast.dataset.dismissed = 'true';
          if (toast._timeoutId) {
            window.clearTimeout(toast._timeoutId);
          }
          toast.classList.remove('is-visible');
          toast.classList.add('is-leaving');
          window.setTimeout(() => toast.remove(), 220);
        };

        const scheduleToastDismiss = (toast, delay = 2600) => {
          if (toast._timeoutId) {
            window.clearTimeout(toast._timeoutId);
          }
          toast._timeoutId = window.setTimeout(() => dismissToast(toast), delay);
        };

        const showToast = (message, kind = 'success') => {
          if (!message) return;
          const toast = document.createElement('div');
          toast.className = `toast toast-${kind}`;
          toast.innerHTML = `
            <span class="toast-icon" aria-hidden="true">${toastGlyph(kind)}</span>
            <span class="toast-message">${message}</span>
            <button type="button" class="toast-close" aria-label="Dismiss notification">
              <span></span>
              <span></span>
            </button>
          `;
          const closeButton = toast.querySelector('.toast-close');
          closeButton?.addEventListener('click', () => dismissToast(toast));
          toast.addEventListener('mouseenter', () => {
            if (toast._timeoutId) {
              window.clearTimeout(toast._timeoutId);
            }
          });
          toast.addEventListener('mouseleave', () => scheduleToastDismiss(toast, 1200));
          toastRoot.appendChild(toast);
          window.requestAnimationFrame(() => {
            toast.classList.add('is-visible');
          });
          scheduleToastDismiss(toast);
        };

        const copyText = async (value) => {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(value);
            return;
          }
          const el = document.createElement('textarea');
          el.value = value;
          el.setAttribute('readonly', '');
          el.style.position = 'absolute';
          el.style.left = '-9999px';
          document.body.appendChild(el);
          el.select();
          document.execCommand('copy');
          document.body.removeChild(el);
        };

        const syncStickyShells = () => {
          const topbar = document.querySelector('.topbar');
          const stickyOffset = topbar ? Math.ceil(topbar.offsetHeight + 8) : 90;
          document.documentElement.style.setProperty('--sticky-top-offset', `${stickyOffset}px`);
          document.querySelectorAll('[data-sticky-shell]').forEach((shell) => {
            const panel = shell.closest('[data-sticky-panel]');
            if (!panel) return;
            panel.style.setProperty('--sticky-shell-height', `${Math.ceil(shell.offsetHeight)}px`);
          });
        };

        window.fedctlUI = {
          showToast,
          syncStickyShells,
          async copy(button) {
            const value = button.dataset.copy || '';
            if (!value) return;
            const originalLabel = button.dataset.copyLabel || button.textContent.trim();
            const copiedLabel = button.dataset.copyDoneLabel || 'Copied';
            const labelNode =
              button.querySelector('[data-copy-label-node]') ||
              button.querySelector('.copy-button-label');
            try {
              await copyText(value);
              button.dataset.copyState = 'done';
              if (labelNode) {
                labelNode.textContent = copiedLabel;
              } else {
                button.textContent = copiedLabel;
              }
              window.setTimeout(() => {
                button.dataset.copyState = 'idle';
                if (labelNode) {
                  labelNode.textContent = originalLabel;
                } else {
                  button.textContent = originalLabel;
                }
              }, 1200);
              showToast(button.dataset.copyToast || 'Copied to clipboard');
            } catch (error) {
              showToast(button.dataset.copyErrorToast || 'Copy failed', 'error');
            }
          },
        };

        document.addEventListener('click', (event) => {
          const button = event.target.closest('[data-copy]');
          if (!button) return;
          event.preventDefault();
          if (!button.dataset.copyEnhanced) {
            const label = button.dataset.copyLabel || button.textContent.trim() || 'Copy';
            button.dataset.copyLabel = label;
            button.dataset.copyEnhanced = 'true';
            button.dataset.copyState = button.dataset.copyState || 'idle';
            button.classList.add('copy-action');
            button.innerHTML = `
              <span class="copy-button-icon" aria-hidden="true">
                <span class="copy-glyph copy-glyph-copy"></span>
                <span class="copy-glyph copy-glyph-check"></span>
              </span>
              <span class="copy-button-label" data-copy-label-node>${label}</span>
            `;
          }
          window.fedctlUI.copy(button);
        });

        document.querySelectorAll('[data-copy]').forEach((button) => {
          if (button.dataset.copyEnhanced) return;
          const label = button.dataset.copyLabel || button.textContent.trim() || 'Copy';
          button.dataset.copyLabel = label;
          button.dataset.copyEnhanced = 'true';
          button.dataset.copyState = button.dataset.copyState || 'idle';
          button.classList.add('copy-action');
          button.innerHTML = `
            <span class="copy-button-icon" aria-hidden="true">
              <span class="copy-glyph copy-glyph-copy"></span>
              <span class="copy-glyph copy-glyph-check"></span>
            </span>
            <span class="copy-button-label" data-copy-label-node>${label}</span>
          `;
        });

        document.querySelectorAll('[data-auto-submit]').forEach((input) => {
          const form = input.form;
          if (!form) return;
          const delay = Number.parseInt(input.dataset.autoSubmit || '250', 10);
          let timeoutId = null;
          const submit = () => form.requestSubmit();
          input.addEventListener('input', () => {
            if (timeoutId !== null) {
              window.clearTimeout(timeoutId);
            }
            timeoutId = window.setTimeout(submit, Number.isNaN(delay) ? 250 : delay);
          });
          input.addEventListener('search', submit);
        });

        document.querySelectorAll('[data-segmented-control]').forEach((control) => {
          control.querySelectorAll('[data-segment-button]').forEach((button) => {
            button.addEventListener('click', (event) => {
              const form = button.form;
              if (!form) return;
              const hiddenStatus = form.querySelector('input[type="hidden"][name="status"]');
              if (hiddenStatus) {
                hiddenStatus.value = button.value;
              }
            });
          });
        });

        const helpNavLinks = Array.from(document.querySelectorAll('[data-help-nav-link]'));
        const helpSections = Array.from(document.querySelectorAll('[data-help-section][id]'));
        const backToTopButton = document.querySelector('[data-back-to-top]');

        const syncHelpNavigation = () => {
          if (!helpNavLinks.length && !backToTopButton) return;
          const topbar = document.querySelector('.topbar');
          const offset = topbar ? topbar.offsetHeight + 28 : 112;
          let activeId = helpSections[0]?.id || '';
          helpSections.forEach((section) => {
            if (section.getBoundingClientRect().top - offset <= 0) {
              activeId = section.id;
            }
          });
          helpNavLinks.forEach((link) => {
            const targetId = (link.getAttribute('href') || '').replace(/^#/, '');
            if (targetId === activeId) {
              link.dataset.active = 'true';
            } else {
              delete link.dataset.active;
            }
          });
          if (backToTopButton) {
            backToTopButton.classList.toggle('is-visible', window.scrollY > 320);
          }
        };

        backToTopButton?.addEventListener('click', () => {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        const formatRelativeTime = (isoString) => {
          const date = new Date(isoString);
          const now = Date.now();
          const diffMs = now - date.getTime();
          if (diffMs < 0) return 'just now';
          const seconds = Math.floor(diffMs / 1000);
          if (seconds < 60) return 'just now';
          const minutes = Math.floor(seconds / 60);
          if (minutes < 60) return `${minutes}m ago`;
          const hours = Math.floor(minutes / 60);
          if (hours < 24) return `${hours}h ago`;
          const days = Math.floor(hours / 24);
          if (days < 30) return `${days}d ago`;
          return null;
        };

        const updateRelativeTimes = () => {
          document.querySelectorAll('time[data-relative]').forEach((el) => {
            const iso = el.getAttribute('datetime');
            if (!iso) return;
            const relative = formatRelativeTime(iso);
            if (relative) {
              el.textContent = relative;
            }
          });
        };

        updateRelativeTimes();
        window.setInterval(updateRelativeTimes, 30000);

        const noticeUrl = new URL(window.location.href);
        const noticeMessage = noticeUrl.searchParams.get('notice');
        if (noticeMessage) {
          showToast(noticeMessage, noticeUrl.searchParams.get('notice_kind') || 'success');
          removeNoticeFromUrl();
        }

        const sync = () => syncStickyShells();
        window.addEventListener('load', sync);
        window.addEventListener('resize', sync);
        window.addEventListener('scroll', syncHelpNavigation, { passive: true });
        window.addEventListener('resize', syncHelpNavigation);
        window.addEventListener('hashchange', syncHelpNavigation);
        sync();
        syncHelpNavigation();
      })();
    </script>
  </body>
</html>
