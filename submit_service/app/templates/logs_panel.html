<section class="panel" id="logs-panel">
  <div class="section-head">
    <div class="section-copy">
      <h2>Logs</h2>
      <p class="muted">Inspect live Nomad output when available, with archived fallback after cleanup.</p>
    </div>
    <div class="log-hint log-meta">
      <span>Current view</span>
      <strong>{{ job }} / {{ 'stderr' if stderr else 'stdout' }}</strong>
      <span class="log-source log-source-{{ logs_source or 'unknown' }}">{{ logs_source or 'unresolved' }}</span>
    </div>
  </div>
  <form method="get" action="/ui/submissions/{{ submission.id }}#logs-panel" class="grid-form logs-form log-controls">
    <input type="hidden" name="return_to" value="{{ return_to }}">
    <label>Job
      <select name="job">
        {% for value, label in log_jobs %}
        <option value="{{ value }}" {% if value == job %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Task
      <input type="text" name="task" value="{{ task }}" placeholder="optional task name">
    </label>
    <label>Index
      <input type="number" name="index" min="1" value="{{ index }}">
    </label>
    <label>Stream
      <select name="stderr">
        <option value="true" {% if stderr %}selected{% endif %}>stderr</option>
        <option value="false" {% if not stderr %}selected{% endif %}>stdout</option>
      </select>
    </label>
    <div class="form-actions">
      <button type="submit">Reload</button>
    </div>
  </form>
  {% if logs_error %}
  <div class="alert error">{{ logs_error }}</div>
  {% endif %}
  <div class="log-box-wrap">
    <div class="log-box ansi-log">{{ logs_html | safe }}</div>
  </div>
</section>
