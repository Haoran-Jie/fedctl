<section class="panel">
  <h2>Logs</h2>
  <form method="get" action="/ui/submissions/{{ submission.id }}" class="grid-form logs-form">
    <label>Job
      <select name="job">
        {% for value, label in log_jobs %}
        <option value="{{ value }}" {% if value == job %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Task
      <input type="text" name="task" value="{{ task }}" placeholder="optional task name">
    </label>
    <label>Index
      <input type="number" name="index" min="1" value="{{ index }}">
    </label>
    <label>Stream
      <select name="stderr">
        <option value="true" {% if stderr %}selected{% endif %}>stderr</option>
        <option value="false" {% if not stderr %}selected{% endif %}>stdout</option>
      </select>
    </label>
    <div class="form-actions">
      <button type="submit">Refresh logs</button>
    </div>
  </form>
  {% if logs_error %}
  <div class="alert error">{{ logs_error }}</div>
  {% endif %}
  <pre class="log-box">{{ logs_content or 'No log content available for this selection.' }}</pre>
</section>
