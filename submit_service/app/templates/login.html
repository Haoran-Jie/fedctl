{% extends 'base.html' %}
{% block title %}Login | fedctl submit service{% endblock %}
{% block content %}
<section class="panel narrow">
  <h1>Login</h1>
  <p class="muted">Use an existing submit-service bearer token. Project submission still happens through <code>fedctl submit run &lt;project-dir&gt;</code>.</p>
  {% if error %}
  <div class="alert error">{{ error }}</div>
  {% endif %}
  <form method="post" action="/ui/login" class="stack">
    <label for="token">Bearer token</label>
    <input id="token" name="token" type="password" required autofocus>
    <button type="submit">Log in</button>
  </form>
</section>
{% endblock %}
